<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Name Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .form-container {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #555;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #0078d7;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Enter Your Name</h2>
    <form action="https://n8n.sohbatech.online/webhook-test/0bcf21c4-c2a7-46b0-9c6c-704d46060bdd"  method="POST" onsubmit="redirectAfterSubmit(event)">
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" name="firstName">

      <label for="lastName">Last Name</label>
      <input type="text" id="lastName" name="lastName">

      <button  type="submit">Submit</button>
    </form>
  </div>

  
<script>
function redirectAfterSubmit(event) {
event.preventDefault(); // Prevent default form submission
// Perform any additional actions here (e.g., validation, API call)
window.location.href = "https://google.com"; // Redirect URL
}
</script>
</body>
</html>
